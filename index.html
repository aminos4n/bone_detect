<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>じゃんけん ひろば</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app" data-scene="idle">
      <div class="sparkles" aria-hidden="true">
        <span class="sparkle">★</span>
        <span class="sparkle">♥</span>
        <span class="sparkle">★</span>
        <span class="sparkle">♥</span>
        <span class="sparkle">★</span>
        <span class="sparkle">♥</span>
      </div>

      <main class="screen-shell">
        <section class="avatar-zone" aria-label="アバター表示">
          <div class="signal-row">
            <div class="signal-card">
              <span class="signal-label">じょうたい</span>
              <strong id="sceneLabel">まってるよ</strong>
            </div>
            <div class="signal-card">
              <span class="signal-label">ひと</span>
              <strong id="personStatus">まだ みつけてないよ</strong>
            </div>
            <div class="signal-card">
              <span class="signal-label">AI</span>
              <strong id="detectorStatus">じゅんび中</strong>
            </div>
          </div>

          <div class="avatar-stage" id="avatarStage">
            <div class="speech-bubble" id="speechBubble">カメラの まえに きてね!</div>
            <img
              class="avatar-image"
              src="assets/nojima_character_couple.png"
              alt="じゃんけんをいっしょにしてくれるキャラクター"
            />
            <div class="invite-chip" id="inviteChip">いっしょに あそぼう!</div>
          </div>

          <div class="headline-card">
            <h1 id="mainHeading">じゃんけん ひろば</h1>
            <p id="subHeading">カメラに うつると ごあいさつ するよ</p>
          </div>
        </section>

        <section class="camera-zone" aria-label="カメラ表示">
          <div class="camera-frame">
            <video id="cameraVideo" autoplay playsinline muted></video>
            <canvas id="overlayCanvas" aria-hidden="true"></canvas>
            <div class="effect-layer" id="effectLayer" aria-hidden="true"></div>

            <div class="camera-placeholder" id="cameraPlaceholder">
              <p class="placeholder-title">がめんをタップして はじめるよ</p>
              <p class="placeholder-text">カメラと おとを じゅんびするよ</p>
              <button class="control-button primary camera-start-button" id="startButton" type="button">
                もういちど ためす
              </button>
              <p class="placeholder-admin" id="detectorHint">はじめに 1かい タップしてね</p>
            </div>

            <div class="video-banner" id="videoBanner">ようこそ! カメラの まえに きてね</div>

            <div class="meter-row">
              <div class="meter-card">
                <span class="meter-label">検知フレーム</span>
                <strong id="frameValue">0 / 10</strong>
                <small>10で あそびへ</small>
              </div>
              <div class="meter-card">
                <span class="meter-label">じゃんけん</span>
                <strong id="roundStatus">まだ じゅんび中</strong>
                <small>あそびで ボタン表示</small>
              </div>
            </div>

            <div class="play-overlay" id="playOverlay">
              <div class="score-strip" aria-label="スコア">
                <div class="score-box">
                  <span class="score-label">かった</span>
                  <strong id="wins">0</strong>
                </div>
                <div class="score-box">
                  <span class="score-label">あいこ</span>
                  <strong id="draws">0</strong>
                </div>
                <div class="score-box">
                  <span class="score-label">まけた</span>
                  <strong id="losses">0</strong>
                </div>
                <div class="score-box score-box-highlight">
                  <span class="score-label">れんしょう</span>
                  <strong id="streak">0</strong>
                </div>
              </div>

              <div class="choice-panel" aria-label="じゃんけんボタン">
                <button class="hand-button rock" data-hand="rock" type="button">
                  <span class="hand-emoji" aria-hidden="true">✊</span>
                  <span class="hand-name">ぐー</span>
                </button>
                <button class="hand-button scissors" data-hand="scissors" type="button">
                  <span class="hand-emoji" aria-hidden="true">✌️</span>
                  <span class="hand-name">ちょき</span>
                </button>
                <button class="hand-button paper" data-hand="paper" type="button">
                  <span class="hand-emoji" aria-hidden="true">✋</span>
                  <span class="hand-name">ぱー</span>
                </button>
              </div>

              <p class="round-message" id="roundMessage">ひとを みつけると あそびが はじまるよ!</p>
            </div>
          </div>

          <div class="control-dock">
            <button class="control-button" id="soundTestButton" type="button">おとを ためす</button>
            <button class="control-button" id="resetButton" type="button">リセット</button>
          </div>

          <details class="debug-panel">
            <summary>テスト</summary>
            <div class="debug-grid">
              <button class="debug-button" data-debug="none" type="button">人なし</button>
              <button class="debug-button" data-debug="small" type="button">小さく検知</button>
              <button class="debug-button" data-debug="large" type="button">大きく検知</button>
            </div>
          </details>
        </section>

        <footer class="credit-bar">VOICEBOX: ずんだもん</footer>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
